name: ambientnav
description: "AmbientNav cross-platform navigation & LED controller app"
publish_to: 'none'

# Keep in sync with the monorepo release (managed by release-please).
version: 0.4.0+1 # x-release-please-version

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management — testable via provider overrides, no BuildContext coupling.
  flutter_riverpod: ^2.6.1

  # Routing & navigation UI.
  maplibre_gl: ^0.20.0          # OSS map rendering + offline regions (OSM tiles)
  geolocator: ^13.0.1           # device GPS position
  flutter_tts: ^4.2.0           # multi-language voice guidance

  # BLE — central role, RSSI exposed natively, bonding/pairing, MTU.
  flutter_blue_plus: ^1.34.5

  # Networking (routing) — HTTPS-only.
  dio: ^5.7.0

  # Local persistence (route cache, configs, theme) behind LocalStore abstraction.
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.2.0

  permission_handler: ^11.3.1   # BLE scan/connect + location runtime permissions
  file_picker: ^8.1.4           # select firmware .bin for OTA
  intl: any                     # localization formatting (pinned by flutter_localizations)

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true                # build app_localizations from lib/core/l10n/*.arb
