name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
  release:
    types: [published]
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag name (e.g. ambientnav-v0.5.0)'
        required: true
        type: string

permissions:
  contents: write  # needed to upload release assets and commit merged binaries

jobs:
  build-front:
    name: Build — ESP32 Front
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-front-${{ hashFiles('firmware/front/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-front-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build front firmware
        run: cd firmware/front && pio run

      - name: Build merged front firmware
        run: cd firmware/front && pio run --target mergebin

      - name: Upload app artifact (front)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-front
          path: firmware/front/.pio/build/front/firmware.bin
          retention-days: 30

      - name: Upload merged front artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-front-merged
          path: firmware/front/.pio/build/front/firmware-merged.bin
          retention-days: 30

  build-rear:
    name: Build — ESP32 Rear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-rear-${{ hashFiles('firmware/rear/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-rear-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build rear firmware
        run: cd firmware/rear && pio run

      - name: Build merged rear firmware
        run: cd firmware/rear && pio run --target mergebin

      - name: Upload app artifact (rear)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-rear
          path: firmware/rear/.pio/build/rear/firmware.bin
          retention-days: 30

      - name: Upload merged rear artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-rear-merged
          path: firmware/rear/.pio/build/rear/firmware-merged.bin
          retention-days: 30

  attach-release-assets:
    name: Attach binaries to GitHub Release
    if: github.event_name == 'release' || github.event_name == 'workflow_call'
    needs: [build-front, build-rear]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: tag
        run: echo "name=${{ inputs.release_tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download front artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-front
          path: dist/front/

      - name: Download rear artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-rear
          path: dist/rear/

      - name: Download front merged artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-front-merged
          path: dist/front-merged/

      - name: Download rear merged artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-rear-merged
          path: dist/rear-merged/

      - name: Rename binaries with version tag
        run: |
          mv dist/front/firmware.bin                   dist/ambientnav-front-${{ steps.tag.outputs.name }}.bin
          mv dist/rear/firmware.bin                    dist/ambientnav-rear-${{ steps.tag.outputs.name }}.bin
          mv dist/front-merged/firmware-merged.bin     dist/ambientnav-front-${{ steps.tag.outputs.name }}-merged.bin
          mv dist/rear-merged/firmware-merged.bin      dist/ambientnav-rear-${{ steps.tag.outputs.name }}-merged.bin

      - name: Commit merged binaries to docs/public for GitHub Pages serving
        run: |
          cp dist/ambientnav-front-${{ steps.tag.outputs.name }}-merged.bin docs/public/firmware-front.bin
          cp dist/ambientnav-rear-${{ steps.tag.outputs.name }}-merged.bin  docs/public/firmware-rear.bin
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/firmware-front.bin docs/public/firmware-rear.bin
          git diff --cached --quiet || git commit -m "chore: update web flash binaries for ${{ steps.tag.outputs.name }}"
          git push origin main

      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/ambientnav-front-${{ steps.tag.outputs.name }}.bin
            dist/ambientnav-rear-${{ steps.tag.outputs.name }}.bin
            dist/ambientnav-front-${{ steps.tag.outputs.name }}-merged.bin
            dist/ambientnav-rear-${{ steps.tag.outputs.name }}-merged.bin
