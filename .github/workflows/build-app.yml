name: Build App

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-app.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/build-app.yml'

# Pin the Flutter version used across all jobs.
env:
  FLUTTER_VERSION: '3.27.1'

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android (APK)
    needs: analyze-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # flutter_tts requires Android SDK platform 36 (compileSdk 36 in app/build.gradle).
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36"
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ambientnav-app-android
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  build-ios:
    name: Build iOS (no codesign)
    needs: analyze-test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign
