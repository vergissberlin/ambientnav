<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);padding:18px;display:flex;gap:12px}
.t{flex:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 0;border:1px solid var(--amb-line)}
.cap{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase}
svg{overflow:visible}</style></head>
<body>
  <div class="t" style="background:var(--amb-cockpit)">
    <svg viewBox="0 0 100 100" width="50" height="50"><defs><linearGradient id="gv" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#19E3FF"/><stop offset="50%" stop-color="#7C5CFF"/><stop offset="100%" stop-color="#FF2D9C"/></linearGradient></defs><g fill="none" stroke="url(#gv)" stroke-width="8.5" stroke-linecap="round" stroke-dasharray="0.1 11.5"><path d="M23 83 L50 17 L77 83"/><path d="M35 59 L65 59"/></g></svg>
    <span class="cap" style="color:var(--amb-text-4)">Gradient</span>
  </div>
  <div class="t" style="background:var(--amb-cockpit)">
    <svg viewBox="0 0 100 100" width="50" height="50"><g fill="none" stroke="#EEF2FA" stroke-width="8.5" stroke-linecap="round" stroke-dasharray="0.1 11.5"><path d="M23 83 L50 17 L77 83"/><path d="M35 59 L65 59"/></g></svg>
    <span class="cap" style="color:var(--amb-text-4)">Mono white</span>
  </div>
  <div class="t" style="background:#19E3FF;border-color:transparent">
    <svg viewBox="0 0 100 100" width="50" height="50"><g fill="none" stroke="#06080E" stroke-width="8.5" stroke-linecap="round" stroke-dasharray="0.1 11.5"><path d="M23 83 L50 17 L77 83"/><path d="M35 59 L65 59"/></g></svg>
    <span class="cap" style="color:#05323A">Knockout</span>
  </div>
  <div class="t" style="background:var(--amb-cockpit)">
    <svg viewBox="0 0 100 100" width="50" height="50"><g fill="none" stroke="#FF2D9C" stroke-width="8.5" stroke-linecap="round" stroke-dasharray="0.1 11.5" style="filter:drop-shadow(0 0 5px rgba(255,45,156,.6))"><path d="M23 83 L50 17 L77 83"/><path d="M35 59 L65 59"/></g></svg>
    <span class="cap" style="color:var(--amb-text-4)">Alert magenta</span>
  </div>
</body></html>
