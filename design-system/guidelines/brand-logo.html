<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);padding:30px;display:flex;align-items:center;gap:46px;justify-content:center}

<body>
  <div>
