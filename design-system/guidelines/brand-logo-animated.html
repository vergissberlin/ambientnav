<!-- @dsCard group="Brand" viewport="800x220" subtitle="Turn-signal dot animation · ambient · guide · alert" name="Logo animated" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      margin: 0;
      background: var(--amb-cockpit);
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .tile {
      flex: 1;
      border-radius: 14px;
      border: 1px solid var(--amb-line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 28px 12px 20px;
      background: var(--amb-surface);
    }

    .cap {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--amb-text-4);
      text-align: center;
    }

    svg { overflow: visible; }

    /* ── Ambient: all dots breathe with gradient colours ── */
    @keyframes amb-breathe {
      0%, 100% { opacity: .32; }
      50%       { opacity: .88; }
    }

    .dot-ambient { animation: amb-breathe 3s ease-in-out infinite; }

    /* ── Guide: single dot flashes bright then fades ── */
    /* Period 1400ms, active window ~40% of period */
    @keyframes guide-flash {
      0%   { opacity: .15; filter: none; }
      12%  { opacity: 1;   filter: drop-shadow(0 0 5px rgba(25,227,255,.95)); }
      40%  { opacity: .4;  filter: drop-shadow(0 0 2px rgba(25,227,255,.3)); }
      100% { opacity: .15; filter: none; }
    }

    .dot-guide-active {
      animation: guide-flash 1400ms ease-in-out infinite;
      fill: rgba(25, 227, 255, 0.18);
    }

    .dot-guide-dim { fill: rgba(124, 92, 255, 0.15); }

    /* ── Alert: all dots pulse magenta simultaneously ── */
    @keyframes alert-pulse {
      0%, 100% { opacity: .2; filter: none; }
      50%       { opacity: 1;  filter: drop-shadow(0 0 6px rgba(255,45,156,.9)); }
    }

    .dot-alert { animation: alert-pulse 900ms ease-in-out infinite; fill: rgba(255, 45, 156, 0.2); }
  </style>
</head>
<body>

  <!-- ── 1 · Ambient ── -->
  <div class="tile">
    <svg viewBox="0 0 100 100" width="72" height="72">
      <!-- Background silhouette -->

      </g>

        <!-- left leg, gradT 0.00–0.42 → cyan tones -->

      </g>
    </svg>
    <div class="cap">Ambient</div>
  </div>
