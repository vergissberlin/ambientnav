<!-- @dsCard group="Colors" viewport="700x150" subtitle="Layered near-black cockpit surfaces + neutrals" name="Surfaces & neutrals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);font-family:var(--font-body);padding:18px;display:flex;gap:10px}
.sw{flex:1;border-radius:10px;overflow:hidden;border:1px solid var(--amb-line)}
.cap{height:74px}.lab{padding:9px 10px;background:var(--amb-surface-2)}
.n{font-family:var(--font-display);font-weight:600;color:var(--amb-text);font-size:13px}
.m{font-family:var(--font-mono);font-size:10px;color:var(--amb-text-3);margin-top:2px}</style></head>
<body>
  <div class="sw"><div class="cap" style="background:#06080E"></div><div class="lab"><div class="n">Cockpit</div><div class="m">#06080E</div></div></div>
  <div class="sw"><div class="cap" style="background:#0B0F18"></div><div class="lab"><div class="n">Surface</div><div class="m">#0B0F18</div></div></div>
  <div class="sw"><div class="cap" style="background:#0E121C"></div><div class="lab"><div class="n">Panel</div><div class="m">#0E121C</div></div></div>
  <div class="sw"><div class="cap" style="background:#9AA4B8"></div><div class="lab"><div class="n">Ash</div><div class="m">#9AA4B8</div></div></div>
  <div class="sw"><div class="cap" style="background:#F4F6FB"></div><div class="lab"><div class="n">Daylight</div><div class="m">#F4F6FB</div></div></div>
</body></html>
