<!-- @dsCard group="Colors" viewport="700x150" subtitle="Glow, not shadow — light blooms in its own hue" name="Glow elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);font-family:var(--font-mono);padding:26px;display:flex;gap:34px;align-items:center;justify-content:center}
.dot{width:46px;height:46px;border-radius:50%}
.c{display:flex;flex-direction:column;align-items:center;gap:14px;font-size:10px;color:var(--amb-text-3)}</style></head>
<body>
  <div class="c"><div class="dot" style="background:var(--amb-cyan);box-shadow:var(--amb-glow-cyan)"></div>glow-cyan</div>
  <div class="c"><div class="dot" style="background:var(--amb-violet);box-shadow:var(--amb-glow-violet)"></div>glow-violet</div>
  <div class="c"><div class="dot" style="background:var(--amb-magenta);box-shadow:var(--amb-glow-magenta)"></div>glow-magenta</div>
</body></html>
