<!-- @dsCard group="Spacing" viewport="700x160" subtitle="Soft radii 4–24 · pill for strips" name="Radius & cards" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);padding:22px;font-family:var(--font-mono);display:flex;gap:18px;align-items:center;justify-content:center}
.c{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--amb-text-4);font-size:10px}
.box{width:64px;height:64px;background:var(--amb-surface-2);border:1px solid var(--amb-line)}
.strip{width:64px;height:18px;border-radius:999px;background:var(--amb-gradient-h);box-shadow:0 0 18px rgba(124,92,255,.4)}</style></head>
<body>
  <div class="c"><div class="box" style="border-radius:4px"></div>4 · xs</div>
  <div class="c"><div class="box" style="border-radius:8px"></div>8 · sm</div>
  <div class="c"><div class="box" style="border-radius:12px"></div>12 · md</div>
  <div class="c"><div class="box" style="border-radius:16px"></div>16 · lg</div>
  <div class="c"><div class="box" style="border-radius:24px"></div>24 · xl</div>
  <div class="c"><div class="strip"></div>999 · strip</div>
</body></html>
