<!-- @dsCard group="Colors" viewport="700x150" subtitle="Two accents carry meaning; violet bridges" name="Signal accents" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);font-family:var(--font-body);padding:18px;display:flex;gap:14px}
.sw{flex:1;border-radius:12px;overflow:hidden;border:1px solid var(--amb-line)}
.cap{height:88px}.lab{padding:10px 12px;background:var(--amb-surface-2)}
.n{font-family:var(--font-display);font-weight:600;color:var(--amb-text);font-size:14px}
.m{font-family:var(--font-mono);font-size:11px;color:var(--amb-text-3);margin-top:2px}
.r{font-size:11px;color:var(--amb-text-4);font-style:italic}</style></head>
<body>
  <div class="sw"><div class="cap" style="background:var(--amb-cyan);box-shadow:var(--amb-glow-cyan) inset"></div><div class="lab"><div class="n">Guide Cyan</div><div class="r">Direction &amp; flow</div><div class="m">#19E3FF</div></div></div>
  <div class="sw"><div class="cap" style="background:var(--amb-violet)"></div><div class="lab"><div class="n">Signal Violet</div><div class="r">Bridge / brand</div><div class="m">#7C5CFF</div></div></div>
  <div class="sw"><div class="cap" style="background:var(--amb-magenta)"></div><div class="lab"><div class="n">Alert Magenta</div><div class="r">Proximity &amp; warning</div><div class="m">#FF2D9C</div></div></div>
</body></html>
