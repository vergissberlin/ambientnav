<!-- @dsCard group="Type" viewport="700x230" subtitle="Display → heading → body → eyebrow" name="Type scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--amb-cockpit);padding:22px 24px;color:var(--amb-text)}
.row{display:flex;align-items:baseline;gap:20px;padding:11px 0;border-bottom:1px solid var(--amb-line)}
.row:last-child{border:0}
.tag{font-family:var(--font-mono);font-size:10px;color:var(--amb-text-4);width:118px;flex:none;letter-spacing:.04em}
.d{font-family:var(--font-display)}</style></head>
<body>
  <div class="row"><span class="tag">DISPLAY 600 · 90</span><span class="d" style="font-weight:600;font-size:40px;letter-spacing:-.035em">AmbientNav</span></div>
  <div class="row"><span class="tag">H2 600 · 30</span><span class="d" style="font-weight:600;font-size:26px;letter-spacing:-.02em">Real-time guidance</span></div>
  <div class="row"><span class="tag">BODY 400 · 16</span><span style="font-family:var(--font-body);font-size:16px;color:var(--amb-text-2)">Light points the way before the next turn.</span></div>
  <div class="row"><span class="tag">EYEBROW · MONO</span><span style="font-family:var(--font-mono);font-size:12px;letter-spacing:.26em;color:var(--amb-cyan);text-transform:uppercase">Live guide · 200 m</span></div>
</body></html>
