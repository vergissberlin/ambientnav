<!-- @dsCard group="Components" viewport="700x250" subtitle="Button · Badge · Card — signal-aware primitives" name="Core" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--amb-cockpit);font-family:var(--font-body);padding:28px;color:var(--amb-text)}
  .grid{display:flex;flex-direction:column;gap:24px;max-width:760px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;color:var(--amb-text-4);text-transform:uppercase;margin-bottom:10px}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
  function findNS(names){
    for (const k of Object.keys(window)) {
      let v; try { v = window[k]; } catch(e) { continue; }
      if (v && typeof v === "object" && names.every(n => { try { return typeof v[n] === "function"; } catch(e){ return false; } })) return v;
    }
    return {};
  }
  const NS = findNS(["Button","Badge","Card"]);
  // Fallbacks mirror the real components so the card renders even before the
  // design-system bundle (_ds_bundle.js) is compiled.
  const Button = NS.Button || function({children,variant="primary",size="md",disabled,style={},...r}){
    const sz={sm:{padding:"8px 14px",fontSize:13},md:{padding:"12px 20px",fontSize:15},lg:{padding:"15px 28px",fontSize:16}}[size];
    const vs={primary:{background:"var(--amb-cyan)",color:"#05323A",boxShadow:"var(--amb-glow-cyan)"},alert:{background:"var(--amb-magenta)",color:"#2A0719",boxShadow:"var(--amb-glow-magenta)"},gradient:{background:"var(--amb-gradient-h)",color:"#06080E",boxShadow:"0 0 26px rgba(124,92,255,.5)"},secondary:{background:"var(--amb-surface-3)",color:"var(--amb-text)",border:"1px solid var(--amb-line-strong)"},ghost:{background:"transparent",color:"var(--amb-text-2)",border:"1px solid var(--amb-line)"}}[variant];
    return <button disabled={disabled} style={{display:"inline-flex",alignItems:"center",gap:9,fontFamily:"var(--font-display)",fontWeight:600,letterSpacing:"-.01em",border:"1px solid transparent",borderRadius:"var(--radius-sm)",cursor:disabled?"not-allowed":"pointer",opacity:disabled?.4:1,...sz,...vs,...style}} {...r}>{children}</button>;
  };
  const Badge = NS.Badge || function({children,tone="neutral",glow,style={},...r}){
    const t={neutral:{color:"var(--amb-text-3)",border:"1px solid var(--amb-line-strong)",bg:"transparent"},cyan:{color:"var(--amb-cyan)",border:"1px solid rgba(25,227,255,.4)",bg:"rgba(25,227,255,.08)"},violet:{color:"var(--amb-violet-soft)",border:"1px solid rgba(124,92,255,.4)",bg:"rgba(124,92,255,.08)"},magenta:{color:"var(--amb-magenta-soft)",border:"1px solid rgba(255,45,156,.4)",bg:"rgba(255,45,156,.08)"}}[tone];
    const g={cyan:"var(--amb-glow-cyan)",violet:"var(--amb-glow-violet)",magenta:"var(--amb-glow-magenta)",neutral:"none"}[tone];
    return <span style={{display:"inline-flex",alignItems:"center",gap:6,fontFamily:"var(--font-mono)",fontSize:11.5,letterSpacing:".1em",textTransform:"uppercase",whiteSpace:"nowrap",padding:"6px 11px",borderRadius:"var(--radius-xs)",color:t.color,border:t.border,background:t.bg,boxShadow:glow?g:"none",...style}} {...r}>{children}</span>;
  };
  const Card = NS.Card || function({children,glow="none",padding=28,style={},...r}){
    const [h,setH]=React.useState(false);
    const g={none:"none",cyan:"var(--amb-glow-cyan)",violet:"var(--amb-glow-violet)",magenta:"var(--amb-glow-magenta)"}[glow];
    return <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:h?"var(--amb-surface-3)":"var(--amb-surface-2)",border:"1px solid var(--amb-line)",borderRadius:"var(--radius-lg)",padding,boxShadow:h&&glow!=="none"?g:"var(--shadow-card)",transition:"all .24s",...style}} {...r}>{children}</div>;
  };
  function Demo(){
    return (
      <div className="grid">
        <div>
          <div className="lab">Button · variants</div>
          <div className="row">
            <Button variant="primary">Start guide</Button>
            <Button variant="alert">Stop</Button>
            <Button variant="gradient">Pair device</Button>
            <Button variant="secondary">Settings</Button>
            <Button variant="ghost">Cancel</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div>
          <div className="lab">Button · sizes</div>
          <div className="row">
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="md">Medium</Button>
            <Button variant="primary" size="lg">Large</Button>
          </div>
        </div>
        <div>
          <div className="lab">Badge</div>
          <div className="row">
            <Badge tone="cyan" glow>Live</Badge>
            <Badge tone="violet">Pairing</Badge>
            <Badge tone="magenta" glow>Proximity</Badge>
            <Badge tone="neutral">2× ESP32</Badge>
            <Badge tone="neutral">WS2812B</Badge>
          </div>
        </div>
        <div>
          <div className="lab">Card</div>
          <div className="row" style={{flexWrap:"nowrap"}}>
            <Card glow="cyan" style={{flex:1}}>
              <div style={{fontFamily:"var(--font-display)",fontWeight:600,fontSize:18}}>Live guide</div>
              <div style={{color:"var(--amb-text-3)",fontSize:14,marginTop:6}}>Cyan flows toward the next turn.</div>
            </Card>
            <Card glow="magenta" style={{flex:1}}>
              <div style={{fontFamily:"var(--font-display)",fontWeight:600,fontSize:18}}>Proximity</div>
              <div style={{color:"var(--amb-text-3)",fontSize:14,marginTop:6}}>Magenta fills inward on approach.</div>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
<script>
  (function(){
    var src = document.getElementById("app-src").textContent;
    var code = Babel.transform(src, {presets:[["react",{runtime:"classic"}]]}).code;
    (0, eval)(code);
  })();
</script>
</body></html>
